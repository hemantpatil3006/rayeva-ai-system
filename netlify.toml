[build]
  # Tell Netlify that the React app is inside the frontend folder
  base = "frontend"
  
  # The command Netlify should run to build the app
  command = "npm run build"
  
  # The folder containing the final compiled assets
  publish = "dist"

# Proxy all API requests to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://rayeva-ai-system.onrender.com/api/:splat"
  status = 200
  force = true

# Redirect all other routing back to index.html (required for React Router/Single Page Apps)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
